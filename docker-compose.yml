services:
  herdsman:
    image: skydiverookie/herdsman:latest
    container_name: herdsman
    ports:
      - "4200:80"
    environment:
      - HERDSMAN_OLLAMA_HOST=http://host.docker.internal:11434
      - HERDSMAN_ADMIN_USER=admin
      - HERDSMAN_ADMIN_PASSWORD=admin
      - HERDSMAN_SECRET_KEY=change-me-in-production
    volumes:
      - herdsman-data:/app/data
    restart: unless-stopped

volumes:
  herdsman-data:
