networks:
  internal:
    external: true

services:
  backend:
    build: ./backend
    container_name: herdsman-backend
    networks:
      - default
      - internal
    environment:
      - HERDSMAN_OLLAMA_HOST=http://ollama:11434
      - HERDSMAN_ADMIN_USER=admin
      - HERDSMAN_ADMIN_PASSWORD=admin
      - HERDSMAN_SECRET_KEY=change-me-in-production
      - HERDSMAN_DB_PATH=/app/data/herdsman.db
      - TZ=Europe/Berlin
    volumes:
      - herdsman-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: herdsman-frontend
    ports:
      - "127.0.0.1:4200:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin

volumes:
  herdsman-data:
